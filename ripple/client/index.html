<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Lemonville 🍋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    <style>
      :root {
        --cream: #fdf6e3;
        --lemon: #ffd93d;
        --green: #6bcb77;
        --sky: #4d96ff;
        --red: #ff6b6b;
        --ink: #2d2d2d;
        --pix: "Press Start 2P", "Courier New", monospace;
        --body: "VT323", "Courier New", monospace;
      }
      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        margin: 0;
        background: var(--cream);
        color: var(--ink);
        font-family: var(--body);
        font-size: 20px;
        -webkit-font-smoothing: none;
        image-rendering: pixelated;
      }
      /* pixel background: faint checker so the "town" reads as a place */
      body {
        background-image:
          linear-gradient(45deg, rgba(45,45,45,.03) 25%, transparent 25%, transparent 75%, rgba(45,45,45,.03) 75%),
          linear-gradient(45deg, rgba(45,45,45,.03) 25%, transparent 25%, transparent 75%, rgba(45,45,45,.03) 75%);
        background-size: 24px 24px;
        background-position: 0 0, 12px 12px;
      }
      .pix { font-family: var(--pix); line-height: 1.5; }
      h1, h2, h3, .pix-h { font-family: var(--pix); }
      button {
        font-family: var(--pix);
        cursor: pointer;
        border: 4px solid var(--ink);
        border-radius: 0;
        background: #fff;
        color: var(--ink);
        box-shadow: 4px 4px 0 var(--ink);
        transition: transform .04s steps(1), box-shadow .04s steps(1), background .1s;
      }
      button:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
      button:disabled { opacity: .5; cursor: not-allowed; box-shadow: 2px 2px 0 var(--ink); }
      input, textarea {
        font-family: var(--body); font-size: 20px;
        border: 4px solid var(--ink); border-radius: 0; background: #fff; color: var(--ink);
      }
      :focus-visible { outline: 3px solid var(--sky); outline-offset: 2px; }
      ::selection { background: var(--lemon); }

      /* animations — CSS only, hard/steppy where it reads as 8-bit */
      .walk { transition: left .9s ease-in-out, top .9s ease-in-out, opacity .5s; }
      .fade-in { animation: fadeIn .2s steps(3) both; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
      .pop { animation: pop .3s steps(4) both; }
      @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.25); } 100% { transform: scale(1); } }
      .poof { animation: poof .5s steps(5) forwards; }
      @keyframes poof { to { opacity: 0; transform: scale(1.6) translateY(-8px); } }
      .bob { animation: bob 1.4s steps(2) infinite; }
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
      .shake { animation: shake .4s steps(2) 2; }
      @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
      .flip { animation: flip .5s steps(2) both; }
      @keyframes flip { 0% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }
      /* town-scene ambience — all CSS, all steppy so it reads 8-bit */
      .step { animation: step .5s steps(2) infinite; }
      @keyframes step { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-4px); } }
      .drift { animation: drift 26s linear infinite; }
      @keyframes drift { from { transform: translateX(-140px); } to { transform: translateX(120vw); } }
      .drift2 { animation: drift 38s linear infinite; }
      .patrol { animation: patrol 9s steps(18) infinite alternate; }
      @keyframes patrol { from { left: 8%; } to { left: 78%; } }
      .fly { animation: fly 14s linear infinite; }
      @keyframes fly { from { transform: translate(-40px,0); } to { transform: translate(96vw,-24px); } }
      .sway { animation: sway 2.4s steps(2) infinite; transform-origin: bottom center; }
      @keyframes sway { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
      .sun { animation: sun 3s steps(2) infinite; }
      @keyframes sun { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
      .coin { animation: coin .9s steps(6) forwards; }
      @keyframes coin { 0% { opacity: 0; transform: translate(-50%, 0) scale(.4); } 40% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -22px) scale(1); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/app.js"></script>
  </body>
</html>
